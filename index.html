<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marrow</title>
<script src="marrow-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sidebar:#06060a; --bg:#0d0d10; --surface:#111115; --surface-2:#18181c;
  --border:#1e1e26; --border-2:#2c2c36; --text:#f4f4f5; --text-2:#a1a1aa;
  --text-3:#71717a; --text-4:#3f3f46; --accent:#7AF17A;
  --accent-dim:rgba(122,241,122,.08); --accent-bdr:rgba(122,241,122,.22);
  --red:#f87171; --red-dim:rgba(248,113,113,.08); --red-bdr:rgba(248,113,113,.22);
  --yellow:#fbbf24; --yellow-dim:rgba(251,191,36,.08); --yellow-bdr:rgba(251,191,36,.22);
  --r:6px; --r-lg:10px;
}
.light {
  --sidebar:#ebebf0; --bg:#f5f5f8; --surface:#ffffff; --surface-2:#f0f0f5;
  --border:#e0e0ea; --border-2:#cacad4; --text:#09090b; --text-2:#3f3f46;
  --text-3:#71717a; --text-4:#a1a1aa; --accent:#16a34a;
  --accent-dim:rgba(22,163,74,.07); --accent-bdr:rgba(22,163,74,.28);
  --red:#dc2626; --red-dim:rgba(220,38,38,.07); --red-bdr:rgba(220,38,38,.22);
  --yellow:#b45309; --yellow-dim:rgba(180,83,9,.07); --yellow-bdr:rgba(180,83,9,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:13px;line-height:1.5;transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
svg{display:block;flex-shrink:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:218px;min-width:218px;background:var(--sidebar);display:flex;flex-direction:column;overflow:hidden;transition:width .22s ease,min-width .22s ease;flex-shrink:0}
.sidebar.collapsed{width:50px;min-width:50px}
.sb-top{padding:14px 10px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-logo-wrap{overflow:hidden;display:flex;align-items:center;flex:1}
.sidebar.collapsed .sb-logo-wrap{opacity:0;pointer-events:none;width:0;flex:0}
.sb-logo-wrap svg{height:13px;width:auto}
.sb-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);color:var(--text-3);cursor:pointer;transition:background .12s,color .12s;flex-shrink:0}
.sb-btn:hover{background:rgba(255,255,255,.07);color:var(--text-2)}
.light .sb-btn:hover{background:rgba(0,0,0,.06)}

.nav-items{flex:1;padding:4px 6px;overflow-y:auto;overflow-x:hidden}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;font-size:12.5px;font-weight:500;color:var(--text-3);cursor:pointer;border-radius:var(--r);transition:all .12s;margin:1px 0;white-space:nowrap;overflow:hidden;position:relative}
.nav-item:hover{color:var(--text-2);background:rgba(255,255,255,.05)}
.light .nav-item:hover{background:rgba(0,0,0,.05)}
.nav-item.active{color:var(--accent);background:var(--accent-dim)}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-lbl{overflow:hidden;transition:opacity .15s,max-width .18s;max-width:180px}
.sidebar.collapsed .nav-lbl{opacity:0;max-width:0}
.nav-bdg{margin-left:auto;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700;flex-shrink:0;transition:opacity .15s}
.nav-bdg.red{background:var(--red-dim);color:var(--red)}
.nav-bdg.green{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-bdr)}
.sidebar.collapsed .nav-bdg{opacity:0;pointer-events:none}
.nav-gap{height:10px}

.sb-user{padding:10px 8px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-top:1px solid rgba(255,255,255,.05)}
.light .sb-user{border-top:1px solid rgba(0,0,0,.08)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent-bdr);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--accent);flex-shrink:0}
.sb-uinfo{flex:1;min-width:0;overflow:hidden;transition:opacity .15s,max-width .18s}
.sidebar.collapsed .sb-uinfo{opacity:0;max-width:0;flex:0}
.sb-uinfo .uname{font-size:11.5px;font-weight:600;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-uinfo .urole{font-size:10px;color:var(--text-4)}
.sb-icons{display:flex;gap:2px;flex-shrink:0;transition:opacity .15s}
.sidebar.collapsed .sb-icons{opacity:0;pointer-events:none}
.sb-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);color:var(--text-4);cursor:pointer;transition:all .12s;position:relative}
.sb-icon:hover{background:rgba(255,255,255,.07);color:var(--text-2)}
.light .sb-icon:hover{background:rgba(0,0,0,.07)}
.notif-dot{position:absolute;top:2px;right:2px;width:6px;height:6px;background:var(--red);border-radius:50%;border:1.5px solid var(--sidebar)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;transition:background .2s}

/* ── TOPBAR ── */
.topbar{padding:22px 28px 4px;flex-shrink:0;display:flex;flex-direction:column}
.tb-back{display:inline-flex;align-items:center;gap:5px;color:var(--text-3);cursor:pointer;font-size:12px;margin-bottom:6px;transition:color .12s;width:fit-content}
.tb-back:hover{color:var(--text-2)}
.tb-back svg{width:12px;height:12px}
.page-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.page-sub{font-size:12px;color:var(--text-3);margin-top:3px}
.page-content{padding:18px 28px 28px;flex:1}

/* ── SECTION HEADERS ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:22px}
.sec-hd:first-child{margin-top:0}
.sec-title{font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.6px}
.sec-link{font-size:11px;color:var(--text-3);cursor:pointer;transition:color .12s}
.sec-link:hover{color:var(--accent)}

/* ── DOT ── */
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.green{background:var(--accent)}.dot.yellow{background:var(--yellow)}.dot.red{background:var(--red)}

/* ── TAG ── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.tag.green{background:var(--accent-dim);color:var(--accent)}
.tag.yellow{background:var(--yellow-dim);color:var(--yellow)}
.tag.red{background:var(--red-dim);color:var(--red)}
.tag.neutral{background:var(--surface-2);color:var(--text-3)}

/* ── ACCORDION SHARED ── */
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .25s ease;opacity:0}
.acc-body.open{max-height:700px;opacity:1}

/* ── CHIPS ── */
.chip-bar{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:20px}
.chip-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:50px;font-size:12px;font-weight:500;color:var(--text-3);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.red{border-color:var(--red-bdr);color:var(--red);background:var(--red-dim)}
.chip.yellow{border-color:var(--yellow-bdr);color:var(--yellow);background:var(--yellow-dim)}
.chip.green{border-color:var(--accent-bdr);color:var(--accent);background:var(--accent-dim)}
/* ── SCOPE TABS ── */
.scope-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2px}
.scope-tab{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all .12s}
.scope-tab.active{background:var(--surface-2);color:var(--text-2)}
/* ── CUSTOMER STATS HEADER ── */
.cust-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.hero-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px}
.hero-lbl{font-size:10px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.hero-val{font-size:24px;font-weight:700;color:var(--tx);letter-spacing:-.8px;line-height:1;margin-bottom:3px}
.hero-sub{font-size:11px;color:var(--text-3)}
/* ── CHAT POPUP ── */
#chat-popup{position:fixed;bottom:90px;right:28px;width:360px;height:480px;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-lg);display:flex;flex-direction:column;z-index:199;box-shadow:0 16px 48px rgba(0,0,0,.55);overflow:hidden;transition:opacity .2s,transform .2s}
#chat-popup.cp-hidden{opacity:0;pointer-events:none;transform:translateY(10px)}
.cp-head{padding:13px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.cp-head-l{display:flex;align-items:center;gap:8px}
.cp-title{font-size:13px;font-weight:700;color:var(--text)}
.cp-ctx{font-size:11px;color:var(--text-3);background:var(--surface-2);border-radius:4px;padding:2px 7px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cp-x{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);color:var(--text-3);cursor:pointer;transition:all .12s}
.cp-x:hover{background:var(--surface-2);color:var(--text-2)}
.cp-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.cp-msg{max-width:86%;padding:9px 12px;border-radius:8px;font-size:12.5px;line-height:1.5}
.cp-msg.u{align-self:flex-end;background:var(--accent-dim);border:1px solid var(--accent-bdr);color:var(--text)}
.cp-msg.a{align-self:flex-start;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2)}
.cp-foot{padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}
.cp-in-row{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:50px;padding:6px 6px 6px 12px;transition:border-color .15s;margin-bottom:7px}
.cp-in-row:focus-within{border-color:var(--accent-bdr)}
.cp-in{flex:1;background:transparent;border:none;outline:none;font-size:12.5px;color:var(--text)}
.cp-in::placeholder{color:var(--text-4)}
.cp-send{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0}
.cp-kb-link{font-size:11px;color:var(--text-3);text-align:center;cursor:pointer;transition:color .12s}
.cp-kb-link:hover{color:var(--accent)}
/* ── OVERVIEW ── */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ov-grid-3{grid-template-columns:1fr 1fr 1fr}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;cursor:pointer;transition:border-color .15s}
.ov-card:hover{border-color:var(--border-2)}
.ov-card-full{grid-column:span 2}
.ov-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ov-card-label{font-size:10px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.6px}
.ov-card-meta{font-size:11px;color:var(--text-3)}
.ov-stat{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.8px;line-height:1;margin-bottom:2px}
.ov-stat-sub{font-size:11px;color:var(--text-4);margin-bottom:12px}
.ov-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.ov-row:last-child{border-bottom:none}
.ov-row-name{font-size:12px;color:var(--text-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-row-val{font-size:11px;color:var(--text-3);white-space:nowrap}
.ov-see-all{margin-top:10px;font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:3px;transition:color .12s}
.ov-see-all:hover{color:var(--accent)}
.act-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)}
.act-row:last-child{border-bottom:none}
.act-text{font-size:12px;color:var(--text-3);flex:1;line-height:1.5}
.act-text span{color:var(--text-2);font-weight:500}
.act-time{font-size:11px;color:var(--text-4);white-space:nowrap;margin-top:1px}

/* ── PRODUCTS PORTFOLIO ── */
.portfolio{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.pf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px 26px 22px;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:column;gap:16px}
.pf-card:hover{border-color:var(--border-2)}
.pf-top{display:flex;flex-direction:column;gap:12px}
.pf-name{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.pf-desc{font-size:12px;color:var(--text-3);line-height:1.55}
.pf-stats{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pf-stat-num{font-size:11.5px;color:var(--text-3)}
.pf-stat-num strong{color:var(--text-2);font-weight:600}
.trend-up{color:var(--accent)}.trend-dn{color:var(--red)}.trend-fl{color:var(--text-4)}
.bullet-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.bullet-item{display:flex;gap:8px;font-size:12px;color:var(--text-2);line-height:1.5}
.bullet-item::before{content:'›';color:var(--text-4);flex-shrink:0}
.bullet-item strong{color:var(--text)}
.view-full-btn{font-size:11.5px;font-weight:600;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:gap .12s}
.view-full-btn:hover{gap:8px}

/* ── CUSTOMERS LIST ── */
.list-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.li-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.li-row:last-child{border-bottom:none}
.li-row:hover{background:var(--surface-2)}
.li-row.open{background:var(--surface-2)}
.li-row-top{display:flex;align-items:center;gap:12px;padding:12px 18px}
.li-av{width:32px;height:32px;border-radius:var(--r);background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text-3);flex-shrink:0;transition:all .12s}
.li-row.open .li-av{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-bdr)}
.li-info{flex:1;min-width:0}
.li-name{font-size:13px;font-weight:600;color:var(--text)}
.li-meta{font-size:11px;color:var(--text-4);margin-top:1px}
.li-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.arr-num{font-size:13px;font-weight:600;color:var(--text)}
.li-acc{border-top:0 solid var(--border);transition:border-top-width 0s}
.li-row.open .li-acc{border-top-width:1px}
.li-acc-inner{padding:12px 18px 16px 62px}

/* ── COMMUNICATION LIST ── */
.upd-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.upd-row:last-child{border-bottom:none}
.upd-row:hover{background:var(--surface-2)}
.upd-row.open{background:var(--surface-2)}
.upd-row-top{display:flex;align-items:center;gap:10px;padding:12px 18px}
.upd-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.upd-time{font-size:11px;color:var(--text-4)}
.push-btn{padding:4px 10px;background:var(--accent-dim);border:1px solid var(--accent-bdr);border-radius:var(--r);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0}
.push-btn:hover{background:var(--accent);color:#000}
.upd-acc{border-top:0 solid var(--border)}
.upd-row.open .upd-acc{border-top-width:1px}
.upd-acc-inner{padding:12px 18px 16px}

/* ── DETAIL PAGE ── */
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.detail-grid-2{grid-template-columns:1fr 1fr}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;margin-bottom:3px}
.stat-val.green{color:var(--accent)}.stat-val.red{color:var(--red)}.stat-val.yellow{color:var(--yellow)}
.stat-sub{font-size:11px;color:var(--text-3)}
.stat-sub.up{color:var(--accent)}.stat-sub.dn{color:var(--red)}

/* CHART BARS */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;grid-column:span 2}
.chart-lbl{font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-row:last-child{margin-bottom:0}
.ch-label{font-size:11.5px;color:var(--text-3);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-bg{flex:1;height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden}
.ch-fill{height:100%;border-radius:4px;transition:width .6s ease}
.ch-val{font-size:11px;color:var(--text-3);width:32px;text-align:right;flex-shrink:0}

/* SENTIMENT BAR */
.sent-bar-wrap{margin-top:10px}
.sent-bar{height:8px;border-radius:4px;display:flex;overflow:hidden;gap:2px}
.sent-seg{height:100%;border-radius:2px;transition:width .6s ease}
.sent-legend{display:flex;gap:14px;margin-top:8px}
.sent-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-3)}
.sent-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* TIMELINE */
.tl-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot-col{width:14px;display:flex;justify-content:center;padding-top:5px;flex-shrink:0}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-body{flex:1}
.tl-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:2px}
.tl-text{font-size:12px;color:var(--text-3);line-height:1.5}
.tl-time{font-size:11px;color:var(--text-4);white-space:nowrap;padding-top:3px}

/* FULL-SPAN CARD */
.full-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;grid-column:1/-1}
.full-card-lbl{font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}

/* KB */
.kb-wrap{display:flex;flex-direction:column;height:100%}
.kb-msgs{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:72%;padding:11px 14px;border-radius:var(--r-lg);font-size:13px;line-height:1.55}
.msg.user{align-self:flex-end;background:var(--accent-dim);border:1px solid var(--accent-bdr);color:var(--text)}
.msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text-2)}
.msg.ai strong{color:var(--text)}
.msg-time{font-size:10px;color:var(--text-4);margin-top:4px}
.kb-notice{padding:9px 14px;background:var(--yellow-dim);border:1px solid var(--yellow-bdr);border-radius:var(--r);font-size:12px;color:var(--yellow);margin:0 28px 14px}
.kb-in-wrap{padding:14px 28px;border-top:1px solid var(--border);flex-shrink:0}
.kb-in-row{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:8px 8px 8px 16px;transition:border-color .15s}
.kb-in-row:focus-within{border-color:var(--accent-bdr)}
.kb-in{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text)}
.kb-in::placeholder{color:var(--text-4)}
.kb-send{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:opacity .15s;flex-shrink:0}
.kb-send:hover{opacity:.82}
.kb-disc{font-size:10px;color:var(--text-4);text-align:center;margin-top:8px}

/* SETTINGS */
.stabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.stab{padding:9px 16px;font-size:12px;font-weight:500;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.stab.active{color:var(--accent);border-bottom-color:var(--accent)}
.int-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.int-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.int-card:hover{border-color:var(--border-2)}
.int-top{display:flex;align-items:center;gap:10px}
.int-icon{width:32px;height:32px;border-radius:var(--r);background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.int-name{font-size:13px;font-weight:600;color:var(--text)}
.int-desc{font-size:11px;color:var(--text-4)}
.int-row{display:flex;align-items:center;justify-content:space-between}
.int-conn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--accent)}
.int-conn-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.conn-btn{padding:4px 11px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);font-size:11px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all .15s}
.conn-btn:hover{color:var(--text-2);border-color:var(--border-2)}
.conn-btn.primary{background:var(--accent-dim);border-color:var(--accent-bdr);color:var(--accent)}
.conn-btn.primary:hover{background:var(--accent);color:#000}

/* CHAT BUBBLE */
.chat-bubble{position:fixed;bottom:28px;right:28px;background:var(--accent);color:#000;border-radius:50px;padding:12px 22px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(122,241,122,.25);z-index:200;transition:all .15s}
.chat-bubble:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(122,241,122,.35)}

    'product-detail': ()=>pageProductDetail(id),
    'customer-detail': ()=>pageCustomerDetail(id),
    'update-detail': ()=>pageUpdateDetail(id),

async function sendMsg() {
  const inp = $('kb-in');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  const msgs = $('kb-msgs');
  msgs.innerHTML += `<div class="msg user">${val}<div class="msg-time">You</div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  kbHistory.push({ role:'user', content:val });

  const hasKey = window.MARROW_OPENAI_KEY && !window.MARROW_OPENAI_KEY.includes('paste');
  if (!hasKey) {
    const reply = 'Please add your OpenAI API key to marrow-config.js to enable live responses.';
    msgs.innerHTML += `<div class="msg ai">${reply}<div class="msg-time">Marrow</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    return;
  }

  const loadId = 'load-' + Date.now();
  msgs.innerHTML += `<div class="msg ai" id="${loadId}"><span style="color:var(--text-4)">Thinking…</span></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+window.MARROW_OPENAI_KEY },
      body: JSON.stringify({ model:'gpt-4o-mini', messages: kbHistory, max_tokens:600 })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Sorry, something went wrong.';
    kbHistory.push({ role:'assistant', content:reply });
    const el = $(loadId);
    if (el) el.innerHTML = reply.replace(/\n/g,'<br>') + `<div class="msg-time">Marrow</div>`;
  } catch(e) {
    const el = $(loadId);
    if (el) el.innerHTML = 'Error connecting to OpenAI. Check your API key.<div class="msg-time">Marrow</div>';
  }
  msgs.scrollTop = msgs.scrollHeight;
}

          <button class="conn-btn" style="font-size:12px;padding:6px 14px">Manage plan</button>

}

  Ask Marrow
</div>

<script>
function toggleChat() {
  chatPopupOpen = !chatPopupOpen;
  $('chat-popup').classList.toggle('cp-hidden', !chatPopupOpen);
  if (chatPopupOpen) {
    $('cp-ctx').textContent = currentPage === 'product-detail' && detailId !== null
      ? CLIENT.products[detailId].name
      : currentPage === 'customer-detail' && detailId !== null
      ? CLIENT.customers[detailId].name
      : currentPage.charAt(0).toUpperCase() + currentPage.slice(1);
    setTimeout(() => $('cp-in').focus(), 100);
  }
}

async function sendPopup() {
  const inp = $('cp-in'), val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  const msgs = $('cp-msgs');
  msgs.innerHTML += `<div class="cp-msg u">${val}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  const hasKey = window.MARROW_OPENAI_KEY && !window.MARROW_OPENAI_KEY.includes('paste');
  if (!hasKey) {
    msgs.innerHTML += `<div class="cp-msg a">Add your OpenAI key to marrow-config.js to enable live responses.</div>`;
    msgs.scrollTop = msgs.scrollHeight;
    return;
  }
  const ctxStr = $('cp-ctx').textContent;
  const sysMsg = `You are Marrow AI for ${CLIENT.companyDisplay}. The user is on the "${ctxStr}" page. Answer briefly (2-4 sentences). Product data: ${JSON.stringify(CLIENT.products.map(p=>({name:p.name,signals:p.signals,problems:p.problems,open:p.open})))}. Customer data: ${JSON.stringify(CLIENT.customers.map(c=>({name:c.name,arr:c.arr,risk:c.risk,signals:c.signals})))}`;
  const lid = 'cp' + Date.now();
  msgs.innerHTML += `<div class="cp-msg a" id="${lid}">…</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  popupHistory.push({ role:'user', content:val });
  try {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+window.MARROW_OPENAI_KEY},
      body: JSON.stringify({ model:'gpt-4o-mini', messages:[{role:'system',content:sysMsg},...popupHistory.slice(-6)], max_tokens:200 })
    });
    const d = await r.json();
    const rep = d.choices?.[0]?.message?.content || 'Something went wrong.';
    popupHistory.push({ role:'assistant', content:rep });
    const el = $(lid); if (el) el.innerHTML = rep.replace(/\n/g,'<br>');
  } catch(e) {
    const el = $(lid); if (el) el.textContent = 'Error — check API key.';
  }
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
