<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marrow</title>
<script src="marrow-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --bg:          #0a0a0b;
  --surface:     #111113;
  --surface-2:   #18181b;
  --border:      #1f1f23;
  --border-2:    #2a2a2e;
  --text:        #fafafa;
  --text-2:      #a1a1aa;
  --text-3:      #71717a;
  --text-4:      #3f3f46;
  --accent:      #7AF17A;
  --accent-bg:   rgba(122,241,122,0.08);
  --accent-bdr:  rgba(122,241,122,0.22);
  --red:         #f87171;
  --red-bg:      rgba(248,113,113,0.08);
  --yellow:      #fbbf24;
  --yellow-bg:   rgba(251,191,36,0.08);
  --radius:      6px;
  --radius-lg:   10px;
}
.light {
  --bg:          #f8f8f8;
  --surface:     #ffffff;
  --surface-2:   #f1f1f3;
  --border:      #e4e4e7;
  --border-2:    #d4d4d8;
  --text:        #09090b;
  --text-2:      #3f3f46;
  --text-3:      #71717a;
  --text-4:      #a1a1aa;
  --accent:      #16a34a;
  --accent-bg:   rgba(22,163,74,0.07);
  --accent-bdr:  rgba(22,163,74,0.28);
  --red:         #dc2626;
  --red-bg:      rgba(220,38,38,0.07);
  --yellow:      #b45309;
  --yellow-bg:   rgba(180,83,9,0.07);
}

/* ── BASE ────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:13px;line-height:1.5;transition:background 200ms,color 200ms}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none}
input{font-family:'Inter',sans-serif}
svg{display:block;flex-shrink:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px}

/* ── LAYOUT ──────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sidebar{width:216px;min-width:216px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background 200ms,border-color 200ms}
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0}
.sb-logo svg{height:16px;width:auto}
.sb-search{margin:10px 10px 4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;display:flex;align-items:center;gap:7px;color:var(--text-4);font-size:12px;cursor:pointer;transition:border-color 150ms}
.sb-search:hover{border-color:var(--border-2)}
.sb-search-key{margin-left:auto;background:var(--surface-2);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--text-4);font-family:'JetBrains Mono',monospace}
.nav-items{flex:1;padding:6px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 12px;font-size:12.5px;font-weight:500;color:var(--text-3);cursor:pointer;border-left:2px solid transparent;transition:all 120ms;margin:1px 0}
.nav-item:hover{color:var(--text-2);background:var(--surface);border-left-color:transparent}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-bg)}
.nav-item svg{width:14px;height:14px;opacity:.75;flex-shrink:0}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.nav-badge.green{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bdr)}
.nav-sep{height:1px;background:var(--border);margin:6px 12px}
.sb-user{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;cursor:pointer;transition:background 120ms}
.sb-user:hover{background:var(--surface)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent-bdr);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--accent);flex-shrink:0}
.avatar.sm{width:22px;height:22px;font-size:8px}
.sb-user-info .name{font-size:12px;font-weight:600;color:var(--text-2)}
.sb-user-info .role{font-size:10px;color:var(--text-4)}

/* ── MAIN ────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;background:var(--bg);transition:background 200ms;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.greeting{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-badge{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color 150ms}
.user-badge:hover{border-color:var(--border-2)}
.badge-info .name{font-size:12px;font-weight:600;color:var(--text-2)}
.badge-info .role{font-size:10px;color:var(--text-4)}
.icon-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text-3);transition:all 150ms;position:relative;flex-shrink:0}
.icon-btn:hover{border-color:var(--border-2);color:var(--text-2)}
.notif-dot{position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:var(--red);border-radius:50%;font-size:8px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.page-content{padding:20px 24px;flex:1}

/* ── CHIPS ───────────────────────────────────────────── */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:50px;font-size:12px;font-weight:500;color:var(--text-3);cursor:pointer;transition:all 150ms;white-space:nowrap}
.chip:hover{border-color:var(--border-2);color:var(--text-2)}
.chip.red{border-color:var(--red-bg);color:var(--red);background:var(--red-bg)}
.chip.yellow{border-color:var(--yellow-bg);color:var(--yellow);background:var(--yellow-bg)}
.chip.green{border-color:var(--accent-bdr);color:var(--accent);background:var(--accent-bg)}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── SECTION LABEL ───────────────────────────────────── */
.section-label{font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}

/* ── BENTO GRID ──────────────────────────────────────── */
.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.bento-2{grid-column:span 2}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;cursor:pointer;transition:border-color 150ms}
.card:hover{border-color:var(--border-2)}
.card-label{font-size:10px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px}
.card-num{font-size:36px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;letter-spacing:-1.5px;line-height:1;margin-bottom:4px}
.card-sub{font-size:11px;color:var(--text-4);margin-bottom:14px}

/* ── PRODUCT ROWS ────────────────────────────────────── */
.prod-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.prod-row:last-child{border-bottom:none}
.prod-name{font-size:12px;color:var(--text-2);flex:1}
.health-bar{width:52px;height:3px;background:var(--surface-2);border-radius:2px;overflow:hidden;flex-shrink:0}
.health-fill{height:100%;border-radius:2px;background:var(--accent)}
.health-fill.warn{background:var(--yellow)}
.health-fill.bad{background:var(--red)}
.health-num{font-size:11px;font-family:'JetBrains Mono',monospace;width:28px;text-align:right;flex-shrink:0}
.health-num.ok{color:var(--accent)}
.health-num.warn{color:var(--yellow)}
.health-num.bad{color:var(--red)}

/* ── CUSTOMER ROWS ───────────────────────────────────── */
.cust-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.cust-row:last-child{border-bottom:none}
.cust-name{font-size:12px;color:var(--text-2)}
.cust-arr{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text)}

/* ── COMM STATS ──────────────────────────────────────── */
.comm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.comm-box{background:var(--surface-2);border-radius:var(--radius);padding:10px 12px}
.comm-box-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.comm-box-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-4);margin-top:3px}

/* ── ACTIVITY FEED ───────────────────────────────────── */
.activity{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0 18px}
.act-row{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.act-row:last-child{border-bottom:none}
.act-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.act-text{font-size:12px;color:var(--text-3);flex:1}
.act-text span{color:var(--text-2);font-weight:500}
.act-time{font-size:11px;color:var(--text-4);font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* ── MINI CHAT BUBBLE ────────────────────────────────── */
.chat-bubble{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#000;border-radius:50px;padding:9px 16px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(122,241,122,.2);transition:all 150ms;z-index:200}
.chat-bubble:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(122,241,122,.3)}
.light .chat-bubble{box-shadow:0 4px 20px rgba(22,163,74,.2)}

/* ── PRODUCTS PAGE ───────────────────────────────────── */
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color 150ms}
.prod-card:hover{border-color:var(--border-2)}
.prod-card-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.prod-card-meta{font-size:11px;color:var(--text-4);margin-top:2px}
.prod-card-health{text-align:right}
.prod-health-big{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.tag.red{background:var(--red-bg);color:var(--red)}
.tag.yellow{background:var(--yellow-bg);color:var(--yellow)}
.tag.green{background:var(--accent-bg);color:var(--accent)}
.add-btn{display:flex;align-items:center;gap:8px;padding:12px 18px;border:1px dashed var(--border-2);border-radius:var(--radius-lg);color:var(--text-4);font-size:12px;font-weight:500;cursor:pointer;transition:all 150ms;background:transparent;width:100%}
.add-btn:hover{border-color:var(--accent-bdr);color:var(--accent);background:var(--accent-bg)}

/* ── COMMUNICATION PAGE ──────────────────────────────── */
.update-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color 150ms}
.update-card:hover{border-color:var(--border-2)}
.update-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.update-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.update-desc{font-size:12px;color:var(--text-3);margin-bottom:10px}
.update-footer{display:flex;align-items:center;gap:8px}
.update-time{font-size:11px;color:var(--text-4);font-family:'JetBrains Mono',monospace;margin-left:auto}
.push-btn{padding:5px 12px;background:var(--accent-bg);border:1px solid var(--accent-bdr);border-radius:var(--radius);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;transition:all 150ms}
.push-btn:hover{background:var(--accent);color:#000}

/* ── KNOWLEDGE BASE (CHAT) ───────────────────────────── */
.kb-wrap{display:flex;flex-direction:column;height:100%}
.kb-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:72%;padding:11px 14px;border-radius:var(--radius-lg);font-size:13px;line-height:1.55}
.msg.user{align-self:flex-end;background:var(--accent-bg);border:1px solid var(--accent-bdr);color:var(--text)}
.msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text-2)}
.msg.ai strong{color:var(--text)}
.msg-meta{font-size:10px;color:var(--text-4);margin-top:4px}
.escalation{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;font-size:12px;color:var(--text-3);align-self:flex-start;max-width:72%}
.escalation strong{color:var(--text-2)}
.escalation .esc-action{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 11px;background:var(--accent-bg);border:1px solid var(--accent-bdr);border-radius:var(--radius);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer}
.kb-input-wrap{padding:14px 24px;border-top:1px solid var(--border);flex-shrink:0}
.kb-input-row{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:8px 8px 8px 16px;transition:border-color 150ms}
.kb-input-row:focus-within{border-color:var(--accent-bdr)}
.kb-input{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);font-family:'Inter',sans-serif}
.kb-input::placeholder{color:var(--text-4)}
.kb-send{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:opacity 150ms}
.kb-send:hover{opacity:.85}
.kb-disclaimer{font-size:10px;color:var(--text-4);text-align:center;margin-top:8px}

/* ── SETTINGS / INTEGRATIONS ─────────────────────────── */
.settings-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.stab{padding:9px 16px;font-size:12px;font-weight:500;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 150ms}
.stab:hover{color:var(--text-2)}
.stab.active{color:var(--accent);border-bottom-color:var(--accent)}
.integration-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.int-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color 150ms}
.int-card:hover{border-color:var(--border-2)}
.int-card-top{display:flex;align-items:center;gap:10px}
.int-icon{width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.int-name{font-size:13px;font-weight:600;color:var(--text)}
.int-desc{font-size:11px;color:var(--text-4)}
.int-status{display:flex;align-items:center;justify-content:space-between}
.int-connected{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--accent)}
.int-connected-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.connect-btn{padding:5px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);font-size:11px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all 150ms}
.connect-btn:hover{border-color:var(--border-2);color:var(--text-2)}
.connect-btn.primary{background:var(--accent-bg);border-color:var(--accent-bdr);color:var(--accent)}
.connect-btn.primary:hover{background:var(--accent);color:#000}

/* ── CUSTOMERS PAGE ──────────────────────────────────── */
.cust-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color 150ms}
.cust-card:hover{border-color:var(--border-2)}
.cust-card-avatar{width:34px;height:34px;border-radius:var(--radius);background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-3);flex-shrink:0}
.cust-card-name{font-size:13px;font-weight:600;color:var(--text)}
.cust-card-meta{font-size:11px;color:var(--text-4);margin-top:2px}
.cust-card-right{text-align:right;margin-left:auto}
.cust-card-arr{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text)}
.cust-card-signals{font-size:10px;color:var(--text-4);margin-top:2px}
</style>
</head>

/* ── PAGE: KNOWLEDGE BASE ────────────────────────────── */
const kbMessages = [
  { role:'user', text:'What are the top issues with CRM Sync this week?' },
  { role:'ai',  text:`<strong>Top 3 issues with CRM Sync this week:</strong><br><br>
    1. <strong>Salesforce sandbox refresh</strong> — field mapping breaks after sandbox reset, affecting Mercatura GmbH and 2 other accounts. Severity: high.<br>
    2. <strong>Dynamics 365 delay</strong> — sync lag of 10–15 minutes reported by Nordwind Energy. Intermittent.<br>
    3. <strong>SAP connector timeout</strong> — 3 failed syncs in the last 48h on accounts with large deal volumes.<br><br>
    Health score has dropped from 79% → 74% over 7 days. Engineering has an open ticket (ENG-441).`, time:'2 min ago' },
];

function pageKB() {
  const msgs = kbMessages.map(m => m.role==='user'
    ? `<div class="msg user">${m.text}<div class="msg-meta">${m.time||''}</div></div>`
    : `<div class="msg ai">${m.text}<div class="msg-meta">Marrow · ${m.time||'now'}</div></div>`
  ).join('');

  const escalation = `
    <div class="escalation">
      <strong>I couldn't find detailed runbook for ENG-441.</strong><br>
      I can route this question to Tom (Engineering) who owns the CRM Sync module.
      <div><span class="esc-action">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>

  return `

    <div class="kb-messages" id="kb-msgs">
      <div style="text-align:center;padding:16px 0 8px">
        <div style="font-size:12px;color:var(--text-4)">Ask anything about ${CLIENT.companyDisplay}'s products, customers, or signals</div>
      </div>
      ${msgs}
      ${escalation}
    </div>
    <div class="kb-input-wrap">
      <div class="kb-input-row">
        <input class="kb-input" id="kb-input" placeholder="Ask about products, customers, or signals..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="kb-send" onclick="sendMsg()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="kb-disclaimer">Answers are grounded in your product data · Powered by Marrow AI</div>
    </div>
  </div>`;
}

function sendMsg() {
  const inp = $('kb-input');
  const val = inp.value.trim();
  if (!val) return;
  const msgs = $('kb-msgs');
  msgs.innerHTML += `<div class="msg user">${val}<div class="msg-meta">just now</div></div>`;
  inp.value = '';
  setTimeout(() => {
    msgs.innerHTML += `<div class="msg ai"><strong>Processing...</strong> I'm searching your product knowledge base for relevant context.<div class="msg-meta">Marrow · now</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }, 600);
  msgs.scrollTop = msgs.scrollHeight;
}

}
function renderSettings() {
  const intCards = integrations.map(i => `
    <div class="int-card">
      <div class="int-card-top">
        <div class="int-icon" style="background:var(--surface-2)">${i.icon}</div>
        <div><div class="int-name">${i.name}</div><div class="int-desc">${i.desc}</div></div>
      </div>
      <div class="int-status">
        ${i.connected
          ? `<div class="int-connected"><div class="int-connected-dot"></div>Connected${i.detail?` · <span style="font-weight:400;color:var(--text-4)">${i.detail}</span>`:''}</div><button class="connect-btn">Manage</button>`
          : `<div style="font-size:11px;color:var(--text-4)">Not connected</div><button class="connect-btn primary">Connect</button>`}
      </div>
    </div>`).join('');

  const general = `
    <div class="card" style="margin-bottom:10px">
      <div class="card-label">Workspace</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
        <div><div style="font-size:13px;font-weight:600;color:var(--text)">${CLIENT.companyDisplay}</div><div style="font-size:11px;color:var(--text-4)">Seed plan · 3 of 5 seats used</div></div>
        <button class="connect-btn" style="font-size:12px;padding:6px 14px">Manage plan</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Client data</div>
      <div style="font-size:12px;color:var(--text-3);line-height:1.6">Currently showing demo data for <strong style="color:var(--text-2)">${CLIENT.companyDisplay}</strong>. To switch demo context, update the <code style="background:var(--surface-2);padding:1px 5px;border-radius:3px;font-size:11px">CLIENT</code> config object at the top of this file.</div>
    </div>`;

  $('main').innerHTML = `
  ${topbar('Settings')}
  <div class="page-content" style="overflow-y:auto;flex:1">
    <div class="settings-tabs">
      <div class="stab ${settingsTab==='general'?'active':''}" onclick="setSettingsTab('general')">General</div>
      <div class="stab ${settingsTab==='integrations'?'active':''}" onclick="setSettingsTab('integrations')">Integrations</div>
      <div class="stab ${settingsTab==='notifications'?'active':''}" onclick="setSettingsTab('notifications')">Notifications</div>
    </div>
    ${settingsTab==='integrations' ? `<div class="integration-grid">${intCards}</div>` : general}
  </div>`;
}

/* ── NAV ─────────────────────────────────────────────── */
const pages = { overview:pageOverview, products:pageProducts, customers:pageCustomers, communication:pageCommunication, kb:pageKB };

function navTo(id) {
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === id);
  });
  if (id === 'settings') { renderSettings(); return; }
  const fn = pages[id];
  if (fn) $('main').innerHTML = fn();
}

document.querySelectorAll('.nav-item[data-page]').forEach(n => {
  n.addEventListener('click', () => navTo(n.dataset.page));
});

/* ── INIT ────────────────────────────────────────────── */
$('sb-avatar').textContent = CLIENT.user.initials;
$('sb-name').textContent   = CLIENT.user.name;
$('sb-role').textContent   = CLIENT.user.role;
$('main').innerHTML = pageOverview();
</script>
</body>
</html>
